<!DOCTYPE html><html><head><meta charset="utf-8"><title>animayte · Rive pet candidates</title>
<style>
  body{font-family:-apple-system,system-ui,sans-serif;background:#eef4fb;color:#22303a;margin:0;padding:24px;text-align:center}
  h1{font-size:18px;margin:0 0 4px} p.sub{color:#7d8a98;font-size:13px;margin:0 0 20px}
  .row{display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
  .card{background:#fff;border-radius:18px;padding:14px;box-shadow:0 10px 26px rgba(70,110,150,.14)}
  .card img{width:200px;height:200px;display:block;image-rendering:auto}
  .card .name{font-weight:700;font-size:15px;margin-top:8px}
  .card .desc{color:#7d8a98;font-size:12px}
  .alt{background:#20303f}  /* dark card to check contrast on dark wallpapers */
</style></head><body>
  <h1>animayte · Rive pet candidates</h1>
  <p class="sub">SVG character designs (import-ready for the Rive editor) — judge the direction</p>
  <div class="row">
    <div class="card"><img src="/rive-pets/mochi.svg"><div class="name">Mochi</div><div class="desc">chubby kitten · mint-green</div></div>
    <div class="card"><img src="/rive-pets/pip.svg"><div class="name">Pip</div><div class="desc">baby chick · peach-coral</div></div>
    <div class="card"><img src="/rive-pets/boo.svg"><div class="name">Boo</div><div class="desc">floating ghost · lavender</div></div>
  </div>
  <div class="row" style="margin-top:18px">
    <div class="card alt"><img src="/rive-pets/mochi.svg"></div>
    <div class="card alt"><img src="/rive-pets/pip.svg"></div>
    <div class="card alt"><img src="/rive-pets/boo.svg"></div>
  </div>
</body></html>
