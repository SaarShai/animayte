<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>animayte · Dijon</title>
<style>
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
  body { display: grid; place-items: center; font: 12px/1.3 ui-monospace, "SF Mono", Menlo, monospace; }
  #wrap { position: relative; }
  canvas { image-rendering: pixelated; display: block; }
  /* speech bubble — small, fades out, never steals clicks */
  #say {
    position: absolute; left: 50%; top: -6px; transform: translate(-50%, -100%);
    max-width: 240px; padding: 6px 10px; border-radius: 10px; white-space: nowrap;
    background: rgba(16, 20, 32, 0.86); color: #e8ecf4; box-shadow: 0 2px 10px rgba(0,0,0,.35);
    opacity: 0; transition: opacity .25s; pointer-events: none;
  }
  #say.show { opacity: 1; }
  #pill { position: fixed; left: 8px; bottom: 6px; color: #59617a; opacity: .5; }
</style>
</head>
<body>
  <div id="wrap">
    <div id="say"></div>
    <canvas id="c"></canvas>
  </div>
  <div id="pill">○ waiting…</div>

<script type="module">
  import { createGridRuntime } from '/grid/runtime.mjs';
  import { GRID } from '/grid/creature.mjs';

  const canvas = document.getElementById('c');
  const pet = createGridRuntime(canvas, { cell: 10 });

  // size the pet to fill the window (the host window sets how big Dijon appears)
  function fit() {
    const cell = Math.max(4, Math.floor(Math.min(window.innerWidth / GRID.w, window.innerHeight / GRID.h)));
    pet.resize(cell);
  }
  window.addEventListener('resize', fit); fit();

  // speech bubble (daemon `say` events) — auto-hides
  const sayEl = document.getElementById('say');
  let sayTimer = 0;
  function say(text, ms = 3500) {
    if (!text) return;
    sayEl.textContent = text; sayEl.classList.add('show');
    clearTimeout(sayTimer); sayTimer = setTimeout(() => sayEl.classList.remove('show'), ms);
  }

  // daemon SSE command → grid runtime (same vocabulary animayte.html uses)
  function dispatch(m) {
    switch (m && m.cmd) {
      case 'hatch': case 'wake': pet.wake(); break;
      case 'reset': case 'resetEgg': pet.reset(); break;
      case 'mood': pet.setMood(m.value); break;
      case 'fullness': pet.setFullness(m.value); break;
      case 'addBird': pet.addBird(m.label); break;
      case 'removeBird': pet.removeBird(); break;
      case 'clearBirds': pet.clearBirds(); break;
      case 'relief': pet.relief(); break;
      case 'react': pet.reactByName(m.name); break;
      case 'endReact': pet.toIdle(); break;
      case 'sleep': pet.sleep(); break;
      case 'say': say(m.text, m.ms); break;
      // 'moodLevel' is intentionally ignored (grid runtime has no mood-drift tint)
    }
  }

  // seed from the daemon's current state, then stream live updates
  const pill = document.getElementById('pill');
  fetch('/health').then((r) => r.json()).then((h) => {
    const s = (h && h.state) || {};
    if (typeof s.fullness === 'number') pet.setFullness(s.fullness);
    if (Array.isArray(s.birds)) s.birds.forEach((b) => pet.addBird(b && b.label));
    if (s.mood) pet.setMood(s.mood);
    if (s.phase === 'sleeping') pet.sleep();
  }).catch(() => {});

  try {
    const es = new EventSource('/events');
    es.onopen = () => { pill.textContent = '● live'; pill.style.color = '#19b36b'; };
    es.onerror = () => { pill.textContent = '○ waiting…'; pill.style.color = ''; };
    es.onmessage = (e) => { try { dispatch(JSON.parse(e.data)); } catch (_) {} };
  } catch (_) {}

  window.pet = pet; // dev affordance
</script>
</body>
</html>
