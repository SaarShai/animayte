<!-- pip: round baby chick · §4.2 warm peach-coral ramp (cool dusty-rose shadow → coral mid → buttery rim) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="pipBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFF3C4"/>
      <stop offset="16%" stop-color="#FFC98A"/>
      <stop offset="46%" stop-color="#FB9C6E"/>
      <stop offset="78%" stop-color="#C85E68"/>
      <stop offset="100%" stop-color="#7E3F5B"/>
    </linearGradient>
    <linearGradient id="pipBeak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFD96A"/>
      <stop offset="100%" stop-color="#F2A23C"/>
    </linearGradient>
  </defs>

  <!-- shadow -->
  <ellipse id="shadow" cx="50" cy="92.5" rx="26" ry="4" fill="#2A101C59"/>

  <g id="chick">
    <!-- tiny tail tuft -->
    <path id="tail" d="M 82 50 Q 92 44 90 54 Q 87 56 83 56 Z" fill="#FB9C6E" stroke="#5A2A3E" stroke-width="2" stroke-linejoin="round"/>

    <!-- round egg-shaped body -->
    <path id="body" d="M 50 19
      C 71 19 83 36 83 56
      C 83 76 69 88 50 88
      C 31 88 17 76 17 56
      C 17 36 29 19 50 19 Z"
      fill="url(#pipBody)" stroke="#5A2A3E" stroke-width="2.4" stroke-linejoin="round"/>

    <!-- head tuft (a single rounded curl) -->
    <path id="tuft" d="M 50 21 Q 44 16 45 9 Q 50 12 51 16 Q 53 11 57 9 Q 56 16 50 21 Z"
      fill="#FFC98A" stroke="#5A2A3E" stroke-width="2" stroke-linejoin="round"/>

    <!-- rim highlight -->
    <ellipse id="rim" cx="41" cy="33" rx="9" ry="6" fill="#FFF3C4" opacity="0.55"/>

    <!-- stubby wings -->
    <path id="wingL" d="M 19 56 Q 11 60 18 67 Q 23 64 25 58 Z" fill="#FB9C6E" stroke="#5A2A3E" stroke-width="2" stroke-linejoin="round"/>
    <path id="wingR" d="M 81 56 Q 89 60 82 67 Q 77 64 75 58 Z" fill="#FB9C6E" stroke="#5A2A3E" stroke-width="2" stroke-linejoin="round"/>

    <!-- little feet -->
    <path id="feet" d="M 41 87 L 41 92 M 38 92 L 44 92 M 59 87 L 59 92 M 56 92 L 62 92"
      fill="none" stroke="#E08A2E" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <g id="face">
    <!-- blush -->
    <ellipse id="blushL" cx="33" cy="60" rx="5.6" ry="3.2" fill="#E86A78" opacity="0.55"/>
    <ellipse id="blushR" cx="67" cy="60" rx="5.6" ry="3.2" fill="#E86A78" opacity="0.55"/>

    <!-- big eyes -->
    <g id="eyeL">
      <ellipse cx="40" cy="52" rx="4.8" ry="6" fill="#3A1A2A"/>
      <circle  cx="41.5" cy="50" r="1.7" fill="#FFF6EC"/>
      <circle  cx="38.7" cy="54.2" r="0.9" fill="#FFF6EC" opacity="0.8"/>
    </g>
    <g id="eyeR">
      <ellipse cx="60" cy="52" rx="4.8" ry="6" fill="#3A1A2A"/>
      <circle  cx="61.5" cy="50" r="1.7" fill="#FFF6EC"/>
      <circle  cx="58.7" cy="54.2" r="0.9" fill="#FFF6EC" opacity="0.8"/>
    </g>

    <!-- little triangle beak (neutral-happy, gently open) -->
    <path id="beakTop" d="M 44 60 L 56 60 L 50 64 Z" fill="url(#pipBeak)" stroke="#5A2A3E" stroke-width="1.6" stroke-linejoin="round"/>
    <path id="beakBot" d="M 46.5 64 L 53.5 64 L 50 66.4 Z" fill="#E08A2E" stroke="#5A2A3E" stroke-width="1.4" stroke-linejoin="round"/>
  </g>
</svg>
