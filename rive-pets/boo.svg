<!-- boo: little round ghost · §4.2 lavender-violet ramp (cool indigo shadow → orchid mid → warm blush-pink rim) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="booBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFE6E0"/>
      <stop offset="16%" stop-color="#E3B6F0"/>
      <stop offset="46%" stop-color="#B98BE6"/>
      <stop offset="78%" stop-color="#6E55C0"/>
      <stop offset="100%" stop-color="#3B3380"/>
    </linearGradient>
  </defs>

  <!-- shadow (small + soft, since it floats) -->
  <ellipse id="shadow" cx="50" cy="93" rx="20" ry="3.4" fill="#1A153A59"/>

  <g id="ghost">
    <!-- rounded dome body with a gentle scalloped hem (4 bumps) -->
    <path id="body" d="M 50 16
      C 70 16 82 31 82 52
      L 82 84
      Q 78 80 74 84
      Q 70 88 66 84
      Q 62 80 58 84
      Q 54 88 50 84
      Q 46 80 42 84
      Q 38 88 34 84
      Q 30 80 26 84
      Q 22 88 18 84
      L 18 52
      C 18 31 30 16 50 16 Z"
      fill="url(#booBody)" stroke="#2A2358" stroke-width="2.4" stroke-linejoin="round"/>

    <!-- rim highlight on the crown -->
    <ellipse id="rim" cx="40" cy="30" rx="9" ry="6.5" fill="#FFE6E0" opacity="0.55"/>

    <!-- little stubby arms -->
    <path id="armL" d="M 18 56 Q 9 58 14 65 Q 19 63 22 58 Z" fill="#B98BE6" stroke="#2A2358" stroke-width="2" stroke-linejoin="round"/>
    <path id="armR" d="M 82 56 Q 91 58 86 65 Q 81 63 78 58 Z" fill="#B98BE6" stroke="#2A2358" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <g id="face">
    <!-- blush -->
    <ellipse id="blushL" cx="33" cy="55" rx="6" ry="3.4" fill="#F58FC0" opacity="0.6"/>
    <ellipse id="blushR" cx="67" cy="55" rx="6" ry="3.4" fill="#F58FC0" opacity="0.6"/>

    <!-- big eyes -->
    <g id="eyeL">
      <ellipse cx="38" cy="48" rx="5" ry="6.4" fill="#241E52"/>
      <circle  cx="39.6" cy="45.8" r="1.8" fill="#FBF2FF"/>
      <circle  cx="36.5" cy="50.4" r="0.9" fill="#FBF2FF" opacity="0.8"/>
    </g>
    <g id="eyeR">
      <ellipse cx="62" cy="48" rx="5" ry="6.4" fill="#241E52"/>
      <circle  cx="63.6" cy="45.8" r="1.8" fill="#FBF2FF"/>
      <circle  cx="60.5" cy="50.4" r="0.9" fill="#FBF2FF" opacity="0.8"/>
    </g>

    <!-- small round 'oooh' mouth (neutral-happy, sweet) -->
    <ellipse id="mouth" cx="50" cy="60" rx="3" ry="3.6" fill="#3A2E66"/>
  </g>
</svg>
