<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>animayte · Dijon face lab</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; padding: 32px 24px 56px;
    background: radial-gradient(1200px 700px at 50% -10%, #1b2440, #0a0e1a 70%);
    font: 13px/1.4 ui-monospace, "SF Mono", Menlo, monospace; color: #aeb6c8; }
  h1 { font-size: 14px; letter-spacing: .14em; text-transform: uppercase; color: #6f7a93; font-weight: 600; text-align: center; margin: 0 0 6px; }
  .sub { text-align: center; color: #59617a; font-size: 12px; margin-bottom: 26px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 18px; max-width: 1100px; margin: 0 auto; }
  .card { background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.06); border-radius: 14px; padding: 14px 14px 12px; text-align: center; }
  .card.ref { opacity: .62; border-style: dashed; }
  .card.hero { border-color: rgba(230,168,23,.35); background: rgba(230,168,23,.05); }
  .card.self { border-color: rgba(236,138,126,.4); background: rgba(236,138,126,.05); }
  .row { display: flex; align-items: flex-end; justify-content: center; gap: 14px; margin-bottom: 8px; }
  .tiny { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .tiny small { color: #4d556b; font-size: 9px; }
  canvas { image-rendering: pixelated; display: block; }
  .name { color: #e6a817; font-size: 13px; letter-spacing: .04em; }
  .card.ref .name { color: #7c869c; }
  .card.self .name { color: #ec8a7e; }
  .note { color: #7c869c; font-size: 11px; margin: 3px 0 7px; min-height: 26px; }
  .spec { color: #4d556b; font-size: 10.5px; line-height: 1.5; }
  .spec b { color: #8893aa; font-weight: 600; }
</style>
</head>
<body>
  <h1>Dijon · face lab</h1>
  <div class="sub" id="sub">family under review — annotate what reads wrong</div>
  <div class="grid" id="grid"></div>

<script type="module">
  import { render, sizeCanvas } from '/grid/engine.mjs';
  import { GRID, PALETTE, compose } from '/grid/creature.mjs';

  // EDIT THIS per family. Each card shows a big review render + a ~30px chip (real size).
  const TITLE = 'family: EXTERNAL vs SELF — concerned (looks OUT) vs sheepish (looks AWAY, blushes)';
  const CANDIDATES = [
    { name: 'sad (today)', ref: true, note: 'the old catch-all — too devastated for a routine setback', face: { eyes: 'open', brows: 'sad', mouth: 'frown' } },
    { name: 'oops (today)', ref: true, note: 'old self-slip face', face: { eyes: 'open', brows: 'worried', mouth: 'awkward', sweat: true } },
    { name: 'concerned · mild', hero: true, note: 'EXTERNAL: open eyes look out, worried brow, small mouth — watchful, not crushed', face: { eyes: 'open', brows: 'worried', mouth: 'small' } },
    { name: 'concerned · worried', hero: true, note: 'EXTERNAL, higher arousal: brow up, frown — a real external setback', face: { eyes: 'open', brows: 'worried', mouth: 'frown' } },
    { name: 'sheepish · A', self: true, note: 'SELF: eyes averted DOWN + worried brow + awkward ’stache + blush — "that was me"', face: { eyes: 'avert', brows: 'worried', mouth: 'awkward', blush: true } },
    { name: 'sheepish · B (sweat)', self: true, note: 'SELF, higher: + a nervous sweat bead', face: { eyes: 'avert', brows: 'worried', mouth: 'awkward', blush: true, sweat: true } },
    { name: 'sheepish · C (glance up)', self: true, note: 'SELF alt: glance up + small mouth + blush — bashful, caught', face: { eyes: 'look_up', brows: 'worried', mouth: 'small', blush: true } },
  ];

  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const BIG = 9, MID = 3, TINY = 1;
  document.getElementById('sub').textContent = TITLE;
  const grid = document.getElementById('grid');

  function specText(f) {
    const parts = [`<b>eyes</b> ${f.eyes || 'dots'}`];
    if (f.brows) parts.push(`<b>brows</b> ${f.brows}`);
    parts.push(`<b>'stache</b> ${f.mouth || 'neutral'}`);
    const acc = ['blush', 'flush', 'sweat', 'zzz'].filter((k) => f[k]);
    if (acc.length) parts.push(`<b>accent</b> ${acc.join(', ')}`);
    return parts.join(' · ');
  }

  function draw(face, props, cell) {
    const cv = document.createElement('canvas');
    const ctx = sizeCanvas(cv, GRID.w, GRID.h, cell, dpr);
    render(ctx, compose(face, { props: props || [] }), PALETTE, { gridW: GRID.w, gridH: GRID.h, cell });
    return cv;
  }

  for (const c of CANDIDATES) {
    const el = document.createElement('div');
    el.className = 'card' + (c.ref ? ' ref' : '') + (c.hero ? ' hero' : '') + (c.self ? ' self' : '');
    const row = document.createElement('div'); row.className = 'row';
    row.appendChild(draw(c.face, c.props, BIG));
    for (const [cell, lbl] of [[MID, '~90px'], [TINY, '~30px']]) {
      const t = document.createElement('div'); t.className = 'tiny';
      t.appendChild(draw(c.face, c.props, cell));
      const s = document.createElement('small'); s.textContent = lbl; t.appendChild(s);
      row.appendChild(t);
    }
    el.appendChild(row);
    const label = document.createElement('div'); label.className = 'name'; label.textContent = c.name; el.appendChild(label);
    const note = document.createElement('div'); note.className = 'note'; note.textContent = c.note || ''; el.appendChild(note);
    const sp = document.createElement('div'); sp.className = 'spec'; sp.innerHTML = specText(c.face); el.appendChild(sp);
    grid.appendChild(el);
  }
</script>
</body>
</html>
