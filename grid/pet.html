<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>animayte · Dijon</title>
<style>
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
  body { display: grid; place-items: center; font: 12px/1.3 ui-monospace, "SF Mono", Menlo, monospace; }
  #wrap { position: relative; }
  canvas { image-rendering: pixelated; display: block; }
  /* speech bubble — small, fades out, never steals clicks */
  #say {
    position: absolute; left: 50%; top: -6px; transform: translate(-50%, -100%);
    max-width: 220px; padding: 6px 10px; border-radius: 10px; white-space: normal; overflow-wrap: anywhere; line-height: 1.3;
    background: rgba(16, 20, 32, 0.86); color: #e8ecf4; box-shadow: 0 2px 10px rgba(0,0,0,.35);
    opacity: 0; transition: opacity .25s; pointer-events: none;
  }
  #say.show { opacity: 1; }
  #pill { position: fixed; left: 8px; bottom: 6px; color: #59617a; opacity: .5; }
</style>
</head>
<body>
  <div id="wrap">
    <div id="say"></div>
    <canvas id="c"></canvas>
  </div>
  <div id="pill">○ waiting…</div>

<script type="module">
  import { createGridRuntime } from '/grid/runtime.mjs';
  import { GRID } from '/grid/creature.mjs';
  import { applyCommand } from '/grid/dispatch.mjs';
  import { createSseSupervisor } from '/grid/sse.mjs';

  const canvas = document.getElementById('c');
  const pet = createGridRuntime(canvas, { cell: 10 });

  // size the pet to fill the window (the host window sets how big Dijon appears)
  function fit() {
    const cell = Math.max(4, Math.floor(Math.min(window.innerWidth / GRID.w, window.innerHeight / GRID.h)));
    pet.resize(cell);
  }
  window.addEventListener('resize', fit); fit();

  // speech bubble (daemon `say` events) — auto-hides
  const sayEl = document.getElementById('say');
  let sayTimer = 0;
  function say(text, ms = 3500) {
    if (!text) return;
    sayEl.textContent = text; sayEl.classList.add('show');
    clearTimeout(sayTimer); sayTimer = setTimeout(() => sayEl.classList.remove('show'), ms);
  }

  // daemon SSE command → grid runtime. The vocabulary lives in grid/dispatch.mjs (shared, unit-tested)
  // so the daemon's broadcast set and the renderer's handled set can't silently drift — see
  // test/contract.test.mjs + test/dispatch.test.mjs. ('moodLevel'/'ping' are intentionally ignored here.)

  // seed mood/fullness/phase from /health for a fast first paint. NOT birds — the SSE snapshot
  // is authoritative for birds (clearBirds + addBird) and seeding them here too would race it and
  // double-count (the /health fetch can resolve after the snapshot already applied).
  const pill = document.getElementById('pill');
  fetch('/health').then((r) => r.json()).then((h) => {
    const s = (h && h.state) || {};
    if (typeof s.fullness === 'number') pet.setFullness(s.fullness);
    if (s.mood) pet.setMood(s.mood);
    if (s.phase === 'sleeping') pet.sleep();
  }).catch(() => {});

  // SSE with a reconnect supervisor + heartbeat watchdog — survives a daemon restart and WKWebView's
  // stuck-in-CONNECTING bug without a frozen pet. The reconnect/backoff/watchdog logic lives in
  // grid/sse.mjs (dependency-injected, fake-clock unit-tested — test/sse.test.mjs). The daemon
  // resends a full snapshot on every (re)connect and a cmd:'ping' every 20s; no bytes for 45s ⇒
  // half-open stream ⇒ force a reconnect.
  const sup = createSseSupervisor({
    url: '/events',
    EventSource: window.EventSource,
    onMessage: (e) => { try { applyCommand(pet, JSON.parse(e.data), { say }); } catch (_) {} },
    onOpen: () => { pill.textContent = '● live'; pill.style.color = '#19b36b'; },
    onDown: (everLive) => { pill.textContent = everLive ? '… reconnecting' : '○ waiting…'; pill.style.color = everLive ? '#e3a008' : ''; },
  });
  sup.open();
  document.addEventListener('visibilitychange', () => { if (!document.hidden && !sup.isLive()) sup.open(); });

  window.pet = pet; // dev affordance
</script>
</body>
</html>
